<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Image Gallery</title>
    
    <!-- Google Fonts for Beautiful Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Link CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Link JS with defer -->
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>My <span class="highlight">Gallery</span></h1>
            <div class="controls">
                <input type="text" id="search-input" placeholder="Search images...">
                <button id="add-btn">+ Add Photo</button>
            </div>
        </div>
        <nav class="nav-tabs" id="nav-tabs">
            <button class="tab-btn active" data-category="all">All</button>
            <button class="tab-btn" data-category="natural">Natural</button>
            <button class="tab-btn" data-category="birds">Birds</button>
            <button class="tab-btn" data-category="river">River</button>
            <button class="tab-btn" data-category="places">Places</button>
        </nav>
    </header>

    <main>
        <div class="gallery-grid" id="gallery-grid">
            <!-- Images injected via JS -->
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <button class="close-btn">&times;</button>
            <button class="prev-btn">&#10094;</button>
            <button class="next-btn">&#10095;</button>
            <img src="" alt="Full view" class="lightbox-img" id="lightbox-img">
            <div class="lightbox-caption" id="lightbox-caption"></div>
        </div>
    </div>

    <!-- Add Photo Modal -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Photo</h2>
                <span class="modal-close">&times;</span>
            </div>
            <form id="add-photo-form">
                <div class="form-group">
                    <label for="img-url">Image URL</label>
                    <input type="url" id="img-url" placeholder="https://example.com/image.jpg" required>
                </div>
                <div class="form-group">
                    <label for="img-category">Category</label>
                    <select id="img-category" required>
                        <option value="natural">Natural</option>
                        <option value="birds">Birds</option>
                        <option value="river">River</option>
                        <option value="places">Places</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="img-title">Title</label>
                    <input type="text" id="img-title" placeholder="Enter image title" required>
                </div>
                <button type="submit" class="submit-btn">Add to Gallery</button>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Image added successfully!</div>

</body>
</html>
